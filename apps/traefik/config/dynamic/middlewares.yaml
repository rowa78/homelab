http:
  middlewares:
    geoblock:
      plugin:
        geoblock:
          silentStartUp: false
          allowLocalRequests: true
          logLocalRequests: false
          logAllowedRequests: false
          logApiRequests: false
          api: "https://get.geojs.io/v1/ip/country/{ip}"
          apiTimeoutMs: 500
          cacheSize: 25
          forceMonthlyUpdate: true
          allowUnknownCountries: false
          unknownCountryApiResponse: "nil"
          blackListMode: false
          countries:
            - DE

    oauth2-auth:
      forwardAuth:
        address: http://oauth2-proxy:4180/oauth2/auth
        trustForwardHeader: true
        authResponseHeaders:
          - X-Auth-Request-User
          - X-Auth-Request-Email
          - Authorization

    oauth2-errors:
      errors:
        status:
          - "401-403"
        service: oauth2-proxy@file
        query: "/oauth2/sign_in?rd={url}"
        statusRewrites:
          "401": 302
          "403": 302

    dashboard-trailing-slash:
      redirectRegex:
        permanent: true
        regex: ^(https?)://([^/]+)/dashboard$
        replacement: ${1}://${2}/dashboard/

    dashboard-root:
      redirectRegex:
        permanent: true
        regex: ^(https?)://([^/]+)/?$
        replacement: ${1}://${2}/dashboard/

  services:
    oauth2-proxy:
      loadBalancer:
        servers:
          - url: http://oauth2-proxy:4180
