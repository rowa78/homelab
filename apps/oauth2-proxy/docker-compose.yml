services:
  valkey:
    image: valkey/valkey:9.1.0
    container_name: oauth2-proxy-valkey
    command: valkey-server --save 60 1 --loglevel warning
    networks:
      - traefik-public
    volumes:
      - ${DATA_DIR}/oauth2-proxy/valkey:/data
    restart: unless-stopped

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    container_name: oauth2-proxy
    networks:
      - traefik-public
    environment:
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_UPSTREAM: static://202
      OAUTH2_PROXY_PROVIDER: keycloak-oidc
      OAUTH2_PROXY_PROVIDER_DISPLAY_NAME: Keycloak
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${OAUTH2_PROXY_OIDC_ISSUER_URL}
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_REDIRECT_URL: https://oauth2-proxy.${DOMAIN}/oauth2/callback
      OAUTH2_PROXY_CODE_CHALLENGE_METHOD: S256
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_COOKIE_DOMAINS: .${DOMAIN}
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_REFRESH: 2m
      OAUTH2_PROXY_COOKIE_EXPIRE: 24h
      OAUTH2_PROXY_SCOPE: openid
      OAUTH2_PROXY_WHITELIST_DOMAINS: .${DOMAIN}
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "true"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_SET_AUTHORIZATION_HEADER: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_SESSION_STORE_TYPE: redis
      OAUTH2_PROXY_REDIS_CONNECTION_URL: redis://valkey:6379
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.oauth2-proxy.rule=Host(`oauth2-proxy.${DOMAIN}`)
      - traefik.http.routers.oauth2-proxy.entrypoints=websecure
      - traefik.http.routers.oauth2-proxy.tls.certresolver=letsencrypt
      - traefik.http.routers.oauth2-proxy.middlewares=geoblock@file
      - traefik.http.services.oauth2-proxy.loadbalancer.server.port=4180

networks:
  traefik-public:
    external: true
